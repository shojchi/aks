models:
  orchestrator:
    model: "claude-haiku-4-5-20251001"
    max_tokens: 512
    temperature: 0.0         # deterministic routing

  code:
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    temperature: 0.2

  pkm:
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    temperature: 0.4

  writing:
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    temperature: 0.6

  planning:
    model: "claude-haiku-4-5-20251001"
    max_tokens: 2048
    temperature: 0.1

  # Phase 2: embeddings
  embeddings:
    model: "text-embedding-3-small"
    provider: "openai"
    dimensions: 1536
