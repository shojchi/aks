provider: "cerebras"  # primary provider — cerebras | gemini

models:
  orchestrator:
    model: "llama3.1-8b"        # fast + cheap for routing decisions
    max_tokens: 512
    temperature: 0.0            # deterministic routing
    pricing: {input_per_1m: 0.10, output_per_1m: 0.10}

  code:
    model: "llama3.1-8b"
    max_tokens: 4096
    temperature: 0.2
    pricing: {input_per_1m: 0.85, output_per_1m: 1.20}

  pkm:
    model: "llama3.1-8b"
    max_tokens: 4096
    temperature: 0.4
    pricing: {input_per_1m: 0.85, output_per_1m: 1.20}

  writing:
    model: "llama3.1-8b"
    max_tokens: 4096
    temperature: 0.6
    pricing: {input_per_1m: 0.85, output_per_1m: 1.20}

  planning:
    model: "llama3.1-8b"
    max_tokens: 2048
    temperature: 0.1
    pricing: {input_per_1m: 0.85, output_per_1m: 1.20}

  # Embeddings always use Gemini regardless of provider
  embeddings:
    model: "gemini-embedding-001"
    provider: "gemini"
    dimensions: 3072
    pricing: {input_per_1m: 0.025, output_per_1m: 0.0}

# Tried in order when primary provider returns 429 / quota exhausted
fallback_chain:
  - provider: gemini
    model: gemini-2.5-flash-lite

# --- Provider reference ---
# cerebras   orchestrator: llama3.1-8b     agents: llama3.1-8b
# gemini     orchestrator: gemini-2.5-flash-lite
